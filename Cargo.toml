[package]
name = "identity"
version = "0.1.0"
authors = ["Ivan Molodetskikh <yalterz@gmail.com>"]
edition = "2021"

[dependencies]
adw = { version = "0.3.1", package = "libadwaita", features = ["v1_2"] }
ashpd = { version = "0.4.0-alpha.4", features = ["gtk4"] }
futures-util = "0.3.26"
gettext-rs = { version = "0.7.0", features = ["gettext-system"] }
glib = { version = "0.17.2", features = ["log", "log_macros"] }
gst = { version = "0.20.2", package = "gstreamer" }
gst-video = { version = "0.20.2", package = "gstreamer-video" }
gst-plugin-gtk4 = "0.10.0"
gtk = { version = "0.6.2", package = "gtk4", features = ["v4_8"] }
log = "0.4.17"
once_cell = "1.17.1"
