[package]
name = "identity"
version = "0.1.0"
authors = ["Ivan Molodetskikh <yalterz@gmail.com>"]
edition = "2021"

[dependencies]
adw = { version = "0.2.0", package = "libadwaita", features = ["v1_2"] }
futures-util = "0.3.25"
gettext-rs = { version = "0.7.0", features = ["gettext-system"] }
glib = { version = "0.16.3", features = ["log", "log_macros"] }
gst = { version = "0.19.2", package = "gstreamer" }
gst-video = { version = "0.19.2", package = "gstreamer-video" }
gst-plugin-gtk4 = "0.9.1"
gtk = { version = "0.5.1", package = "gtk4", features = ["v4_6"] }
log = "0.4.17"
once_cell = "1.16.0"
