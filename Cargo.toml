[package]
name = "identity"
version = "0.1.0"
authors = ["Ivan Molodetskikh <yalterz@gmail.com>"]
edition = "2021"

[dependencies]
adw = { version = "0.5.2", package = "libadwaita", features = ["v1_2"] }
ashpd = { version = "0.6.2", features = ["gtk4"] }
futures-util = "0.3.28"
gettext-rs = { version = "0.7.0", features = ["gettext-system"] }
glib = { version = "0.18.1", features = ["log", "log_macros"] }
gst = { version = "0.21.0", package = "gstreamer" }
gst-video = { version = "0.21.0", package = "gstreamer-video" }
gst-plugin-gtk4 = { version = "0.11.0", features = ["wayland", "x11egl", "x11glx"] }
gtk = { version = "0.7.2", package = "gtk4", features = ["v4_8"] }
log = "0.4.20"
once_cell = "1.18.0"
