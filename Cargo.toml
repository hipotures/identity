[package]
name = "identity"
version = "0.1.0"
authors = ["Ivan Molodetskikh <yalterz@gmail.com>"]
edition = "2021"

[dependencies]
adw = { version = "0.5.2", package = "libadwaita", features = ["v1_4"] }
ashpd = { version = "0.6.2", features = ["gtk4"] }
futures-util = "0.3.28"
gettext-rs = { version = "0.7.0", features = ["gettext-system"] }
glib = { version = "0.18.1", features = ["log"] }
gst = { version = "0.21.0", package = "gstreamer" }
gst-video = { version = "0.21.0", package = "gstreamer-video" }
gtk = { version = "0.7.2", package = "gtk4", features = ["v4_12"] }
once_cell = "1.18.0"
tracing = "0.1.37"
tracing-tracy = "0.10.3"
tracing-subscriber = { version = "0.3.17", features = ["env-filter"] }
tracing-log = "0.1.3"
tracing-chrome = "0.7.1"

[dependencies.gst-plugin-gtk4]
git = "https://gitlab.freedesktop.org/YaLTeR/gst-plugins-rs.git"
branch = "gtk4-scaling-filter-stable"
features = ["wayland", "x11egl", "x11glx", "scaling_filter", "gtk4_12"]
