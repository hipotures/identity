[package]
name = "identity"
version = "0.1.0"
authors = ["Ivan Molodetskikh <yalterz@gmail.com>"]
edition = "2021"

[dependencies]
adw = { version = "0.1.1", package = "libadwaita" }
futures-util = "0.3.24"
gettext-rs = { version = "0.7.0", features = ["gettext-system"] }
glib = { version = "0.15.12", features = ["log", "log_macros"] }
gst = { version = "0.18.8", package = "gstreamer" }
gst-video = { version = "0.18.7", package = "gstreamer-video", features = ["v1_10"] }
gst-plugin-gtk4 = "0.1.1"
gtk = { version = "0.4.8", package = "gtk4", features = ["v4_6"] }
log = "0.4.17"
once_cell = "1.15.0"
